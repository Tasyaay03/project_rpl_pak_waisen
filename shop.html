    <style>
      * {
        scrollbar-width: thin;
        scrollbar-color: #ddd4c4 transparent;
      }
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-thumb {
        background: #ddd4c4;
        border-radius: 3px;
      }
      .sb-link {
        position: relative;
        transition: all 0.2s;
      }
      .sb-link::before {
        content: '';
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 3px;
        height: 0;
        background: #e2a93b;
        border-radius: 0 2px 2px 0;
        transition: height 0.25s;
      }
      .sb-link:hover::before,
      .sb-link.active::before {
        height: 60%;
      }
      .sb-link.active {
        background: rgba(226, 169, 59, 0.1);
        color: #8a6620;
      }
      .gtoggle .gitems {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.35s;
      }
      .gtoggle.open .gitems {
        max-height: 500px;
      }
      .gtoggle .chev {
        transition: transform 0.3s;
      }
      .gtoggle.open .chev {
        transform: rotate(90deg);
      }
      .fade-in {
        animation: fadeIn 0.3s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .toast-in {
        animation: tIn 0.4s ease-out;
      }
      .toast-out {
        animation: tOut 0.3s ease-in forwards;
      }
      @keyframes tIn {
        from {
          opacity: 0;
          transform: translateX(100%);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes tOut {
        from {
          opacity: 1;
          transform: translateX(0);
        }
        to {
          opacity: 0;
          transform: translateX(100%);
        }
      }
      .mo-overlay {
        animation: moIn 0.2s;
      }
      @keyframes moIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .mo-content {
        animation: mcIn 0.3s ease-out;
      }
      @keyframes mcIn {
        from {
          opacity: 0;
          transform: scale(0.96) translateY(8px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      .trow:hover {
        background: rgba(226, 169, 59, 0.04);
      }
      .c-fade {
        animation: cFade 0.4s ease-out;
      }
      @keyframes cFade {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .c-card {
        transition:
          transform 0.25s,
          box-shadow 0.25s;
      }
      .c-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1);
      }
      .c-img {
        transition: transform 0.5s;
      }
      .c-card:hover .c-img {
        transform: scale(1.08);
      }
      .cat-pill {
        transition: all 0.2s;
      }
      .cat-pill.active,
      .cat-pill:hover {
        background: #e2a93b;
        color: #141210;
        box-shadow: 0 2px 12px rgba(226, 169, 59, 0.3);
      }
      .qty-btn {
        transition: all 0.15s;
      }
      .qty-btn:hover {
        background: #e2a93b;
        color: #141210;
      }
      .img-ph {
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(226, 169, 59, 0.4);
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
      @media (max-width: 1024px) {
        .admin-sb {
          transform: translateX(-100%);
          position: fixed !important;
          z-index: 50;
        }
        .admin-sb.open {
          transform: translateX(0);
        }
      }
    </style>

        var canCrud = crudTables.indexOf(id) !== -1;
        return data
          .map(function (row, i) {

              .map(function (c) {
                var v = row[c.k];

              cells +

          mo.style.cssText = 'background:rgba(0,0,0,.35);backdrop-filter:blur(4px)';

          '</div>';

      function aSave(id, idx) {
        var ff = aFormFields(id),
          data = aData(id);

        if (!form) return;
        var inputs = form.querySelectorAll('input,textarea,select');
        var obj = {};

        inputs.forEach(function (inp) {
          if (inp.required && !inp.value.trim()) {
            inp.classList.add('border-red-400');
            ok = false;
          } else inp.classList.remove('border-red-400');
          var v = inp.value;
          if (inp.type === 'number') v = Number(v);
          obj[inp.name] = v;
        });
        if (!ok) {
          toast('Lengkapi field wajib', 'error');
          return;

        /* Auto-fill derived fields */
        if (id === 'suppliers' && obj.category_id) {
          obj.category_name =
            (
              D.categories.find(function (c) {
                return c.id === Number(obj.category_id);
              }) || {}
            ).name || '';
        }
        if (id === 'supplierProducts' && obj.category_id) {
          obj.category_name =
            (
              D.categories.find(function (c) {
                return c.id === Number(obj.category_id);
              }) || {}
            ).name || '';

        if (id === 'products' && obj.category_id) {
          obj.category_name =
            (
              D.categories.find(function (c) {
                return c.id === Number(obj.category_id);
              }) || {}
            ).name || '';
        }

        if (idx === -1) {
          obj.id = data.length
            ? Math.max.apply(
                null,
                data.map(function (d) {
                  return d.id;
                }),
              ) + 1

      function addToCart(pid) {
        var ex = cart.find(function (c) {
          return c.pid === pid;
        });
        if (ex) ex.qty++;
        else cart.push({ pid: pid, qty: 1 });
        updateCartBadge();
        toast('Ditambahkan ke keranjang');
      }
      function removeFromCart(pid) {
        cart = cart.filter(function (c) {
          return c.pid !== pid;
        });
        updateCartBadge();
        renderCart();
      }
      function updateCartQty(pid, d) {
        var it = cart.find(function (c) {
          return c.pid === pid;
        });
        if (!it) return;
        it.qty = Math.max(1, it.qty + d);
        renderCart();
      }
      function getCartTotal() {
        return cart.reduce(function (s, c) {
          var p = D.products.find(function (x) {
            return x.id === c.pid;
          });
          return s + (p ? p.sell_price_idr * c.qty : 0);
        }, 0);
      }
      function getCartCount() {
        return cart.reduce(function (s, c) {
          return s + c.qty;
        }, 0);
      }
      function updateCartBadge() {
        var b = document.getElementById('cartBadge'),
          n = getCartCount();
        b.textContent = n;
        b.classList.toggle('hidden', n === 0);
        b.classList.toggle('flex', n > 0);
      }

        var o = document.getElementById('cartOverlay'),
          d = document.getElementById('cartDrawer');

          o.classList.remove('hidden');
          setTimeout(function () {
            d.classList.remove('translate-x-full');
          }, 10);
          renderCart();
        } else {
          d.classList.add('translate-x-full');
          setTimeout(function () {
            o.classList.add('hidden');
          }, 300);
        }

        if (!cart.length) {
          items.innerHTML =
            '<div class="text-center py-16"><i class="fa-solid fa-bag-shopping text-4xl text-sf-200 mb-3"></i><p class="text-sf-400 text-sm">Keranjang masih kosong</p><button onclick="toggleCart()" class="mt-4 text-sm text-brand-600 hover:text-brand-700 font-medium">Mulai Belanja</button></div>';
          foot.innerHTML = '';
          return;
        }
        items.innerHTML = cart
          .map(function (c) {
            var p = D.products.find(function (x) {
              return x.id === c.pid;
            });
            if (!p) return '';
            return (
              '<div class="flex gap-3 bg-sf-50 rounded-xl p-3"><img src="' +
              p.img +
              '" class="w-16 h-16 rounded-lg object-cover flex-shrink-0" onerror="imgError(this)"><div class="flex-1 min-w-0"><p class="text-sm font-medium text-sf-800 truncate">' +
              p.product_name +
              '</p><p class="text-sm font-heading font-bold text-brand-600 mt-0.5">' +
              fmt(p.sell_price_idr) +
              '</p><div class="flex items-center justify-between mt-2"><div class="flex items-center gap-0 border border-sf-200 rounded-lg overflow-hidden"><button onclick="updateCartQty(' +
              p.id +
              ',-1)" class="qty-btn w-7 h-7 flex items-center justify-center text-sf-500 text-xs"><i class="fa-solid fa-minus"></i></button><span class="w-8 h-7 flex items-center justify-center text-xs font-semibold text-sf-800 border-x border-sf-200">' +
              c.qty +
              '</span><button onclick="updateCartQty(' +
              p.id +
              ',1)" class="qty-btn w-7 h-7 flex items-center justify-center text-sf-500 text-xs"><i class="fa-solid fa-plus"></i></button></div><button onclick="removeFromCart(' +
              p.id +
              ')" class="text-sf-400 hover:text-red-500 transition text-xs"><i class="fa-solid fa-trash"></i></button></div></div></div>'
            );
          })
          .join('');
        foot.innerHTML =
          '<div class="space-y-3"><div class="flex justify-between text-sm"><span class="text-sf-400">Total (' +
          getCartCount() +
          ' item)</span><span class="font-heading font-bold text-sf-800">' +
          fmt(getCartTotal()) +
          '</span></div><button onclick="toggleCart();openCheckout()" class="w-full py-3 bg-brand-500 hover:bg-brand-600 text-white font-semibold text-sm rounded-xl transition shadow-lg shadow-brand-500/20">Pesan Sekarang</button></div>';
      }

      var coStep = 0;
      function openCheckout() {
        if (!cart.length) return;
        coStep = 1;
        renderCheckout();
        var o = document.getElementById('checkoutOverlay');
        o.classList.remove('hidden');
        o.classList.add('flex', 'mo-overlay');
      }
      function closeCheckout() {
        var o = document.getElementById('checkoutOverlay');
        o.classList.add('hidden');
        o.classList.remove('flex', 'mo-overlay');
        if (coStep === 3) {
          cart = [];
          updateCartBadge();
        }
      }
      document.getElementById('checkoutOverlay').addEventListener('click', function (e) {
        if (e.target === document.getElementById('checkoutOverlay')) closeCheckout();
      });

      function renderCheckout() {
        var title = document.getElementById('checkoutTitle'),
          body = document.getElementById('checkoutBody'),
          foot = document.getElementById('checkoutFooter');
        var total = getCartTotal(),
          dpPct = 30,
          dpAmt = Math.round((total * dpPct) / 100),
          remaining = total - dpAmt;

        if (coStep === 1) {
          title.textContent = 'Data Pengiriman';
          var h =
            '<div class="space-y-4"><div class="grid grid-cols-1 sm:grid-cols-2 gap-4"><div><label class="block text-xs font-medium text-sf-500 mb-1">Nama Lengkap <span class="text-red-500">*</span></label><input type="text" id="coName" class="w-full border border-sf-200 rounded-xl px-4 py-2.5 text-sm text-sf-800 focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition" placeholder="Nama penerima"></div><div><label class="block text-xs font-medium text-sf-500 mb-1">No. Telepon <span class="text-red-500">*</span></label><input type="text" id="coPhone" class="w-full border border-sf-200 rounded-xl px-4 py-2.5 text-sm text-sf-800 focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition" placeholder="08xxxxxxxxxx"></div></div><div><label class="block text-xs font-medium text-sf-500 mb-1">Alamat Lengkap <span class="text-red-500">*</span></label><textarea id="coAddr" rows="2" class="w-full border border-sf-200 rounded-xl px-4 py-2.5 text-sm text-sf-800 focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition resize-none" placeholder="Jl. ..."></textarea></div><div class="grid grid-cols-1 sm:grid-cols-2 gap-4"><div><label class="block text-xs font-medium text-sf-500 mb-1">Kota <span class="text-red-500">*</span></label><input type="text" id="coCity" class="w-full border border-sf-200 rounded-xl px-4 py-2.5 text-sm text-sf-800 focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition" placeholder="Kota"></div><div><label class="block text-xs font-medium text-sf-500 mb-1">Provinsi <span class="text-red-500">*</span></label><input type="text" id="coProv" class="w-full border border-sf-200 rounded-xl px-4 py-2.5 text-sm text-sf-800 focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition" placeholder="Provinsi"></div></div><div><label class="block text-xs font-medium text-sf-500 mb-1">Metode Pembayaran DP</label><select id="coMethod" class="w-full border border-sf-200 rounded-xl px-4 py-2.5 text-sm text-sf-800 focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition"><option>Transfer BCA</option><option>Transfer BRI</option><option>Transfer Mandiri</option><option>OVO</option><option>GoPay</option><option>DANA</option></select></div>';
          h += '<div class="bg-sf-50 rounded-xl p-4 space-y-2"><p class="text-xs font-semibold text-sf-500 uppercase tracking-wider mb-2">Ringkasan Pesanan</p>';
          cart.forEach(function (c) {
            var p = D.products.find(function (x) {
              return x.id === c.pid;
            });
            if (p)
              h +=
                '<div class="flex justify-between text-sm"><span class="text-sf-600 truncate flex-1 mr-3">' +
                p.product_name +
                ' x' +
                c.qty +
                '</span><span class="text-sf-800 font-medium flex-shrink-0">' +
                fmt(p.sell_price_idr * c.qty) +
                '</span></div>';
          });
          h +=
            '<div class="border-t border-sf-200 pt-2 mt-2 space-y-1"><div class="flex justify-between text-sm"><span class="text-sf-500">Total</span><span class="font-heading font-bold text-sf-800">' +
            fmt(total) +
            '</span></div><div class="flex justify-between text-sm"><span class="text-sf-500">DP ' +
            dpPct +
            '%</span><span class="font-medium text-brand-600">' +
            fmt(dpAmt) +
            '</span></div><div class="flex justify-between text-sm"><span class="text-sf-500">Sisa Pembayaran</span><span class="text-sf-600">' +
            fmt(remaining) +
            '</span></div></div></div></div>';
          body.innerHTML = h;
          foot.innerHTML =
            '<button onclick="closeCheckout()" class="px-5 py-2.5 text-sm font-medium text-sf-500 border border-sf-200 rounded-xl hover:bg-sf-50 transition">Batal</button><button onclick="coValidate()" class="px-5 py-2.5 text-sm font-medium bg-brand-500 text-white rounded-xl hover:bg-brand-600 transition shadow-lg shadow-brand-500/20">Lanjut Bayar DP</button>';
        } else if (coStep === 2) {
          var method = (document.getElementById('coMethod') || {}).value || 'Transfer BCA';
          title.textContent = 'Konfirmasi Pembayaran DP';
          body.innerHTML =
            '<div class="text-center space-y-5"><div class="w-16 h-16 rounded-2xl bg-brand-50 border border-brand-200 flex items-center justify-center mx-auto"><i class="fa-solid fa-credit-card text-2xl text-brand-600"></i></div><div><p class="text-sm text-sf-500">Silakan transfer DP sebesar</p><p class="text-3xl font-heading font-bold text-brand-600 mt-1">' +
            fmt(dpAmt) +
            '</p><p class="text-xs text-sf-400 mt-1">melalui ' +
            method +
            '</p></div><div class="bg-sf-50 rounded-xl p-4 text-left space-y-2"><p class="text-[10px] text-sf-400 uppercase tracking-wider font-semibold">Detail Transfer</p><div class="flex justify-between text-sm"><span class="text-sf-500">Bank</span><span class="text-sf-800 font-medium">BCA</span></div><div class="flex justify-between text-sm"><span class="text-sf-500">No. Rekening</span><span class="text-sf-800 font-mono font-semibold">1234567890</span></div><div class="flex justify-between text-sm"><span class="text-sf-500">Atas Nama</span><span class="text-sf-800 font-medium">Xiaaa Import</span></div><div class="flex justify-between text-sm"><span class="text-sf-500">Jumlah</span><span class="text-sf-800 font-heading font-bold text-brand-600">' +
            fmt(dpAmt) +
            '</span></div></div><div class="bg-amber-50 border border-amber-200 rounded-xl p-3 text-left"><p class="text-xs text-amber-700"><i class="fa-solid fa-info-circle mr-1"></i>Pesanan akan diproses setelah pembayaran DP dikonfirmasi.</p></div></div>';
          foot.innerHTML =
            '<button onclick="coStep=1;renderCheckout()" class="px-5 py-2.5 text-sm font-medium text-sf-500 border border-sf-200 rounded-xl hover:bg-sf-50 transition"><i class="fa-solid fa-arrow-left mr-1.5"></i>Kembali</button><button onclick="coStep=3;renderCheckout()" class="px-5 py-2.5 text-sm font-medium bg-emerald-500 text-white rounded-xl hover:bg-emerald-600 transition">Saya Sudah Transfer</button>';
        } else if (coStep === 3) {
          var name = (document.getElementById('coName') || {}).value || 'Customer';
          var newOrder = {
            id: cMyOrders.length
              ? Math.max.apply(
                  null,
                  cMyOrders.map(function (o) {
                    return o.id;
                  }),
                ) + 1
              : 1,
            customer_request_id: null,
            customer_id: 0,
            order_date: new Date().toISOString().split('T')[0],
            product_id: cart[0] ? cart[0].pid : 0,
            qty: cart.reduce(function (s, c) {
              return s + c.qty;
            }, 0),
            total_price_idr: total,
            dp_amount_idr: dpAmt,
            remaining_payment_idr: remaining,
            status: 'menunggu barang',
          };
          cMyOrders.unshift(newOrder);
          title.textContent = 'Pesanan Berhasil';
          body.innerHTML =
            '<div class="text-center space-y-5 py-2"><div class="w-20 h-20 rounded-full bg-emerald-50 border-2 border-emerald-200 flex items-center justify-center mx-auto"><i class="fa-solid fa-check text-3xl text-emerald-500"></i></div><div><p class="text-lg font-heading font-bold text-sf-800">Terima kasih, ' +
            name +
            '!</p><p class="text-sm text-sf-400 mt-1">Pesanan kamu sedang diproses</p></div><div class="bg-sf-50 rounded-xl p-4 text-left space-y-2"><div class="flex justify-between text-sm"><span class="text-sf-400">No. Pesanan</span><span class="font-mono font-semibold text-sf-800">XIA-' +
            String(newOrder.id).padStart(4, '0') +
            '</span></div><div class="flex justify-between text-sm"><span class="text-sf-400">Total</span><span class="font-heading font-bold text-sf-800">' +
            fmt(total) +
            '</span></div><div class="flex justify-between text-sm"><span class="text-sf-400">DP Dibayar</span><span class="text-emerald-600 font-medium">' +
            fmt(dpAmt) +
            '</span></div><div class="flex justify-between text-sm"><span class="text-sf-400">Sisa</span><span class="text-sf-600">' +
            fmt(remaining) +
            '</span></div><div class="flex justify-between text-sm"><span class="text-sf-400">Status</span>' +
            stBadge('menunggu barang') +
            '</div></div></div>';
          foot.innerHTML =
            '<button onclick="closeCheckout();cNav(\'orders\')" class="px-5 py-2.5 text-sm font-medium bg-brand-500 text-white rounded-xl hover:bg-brand-600 transition shadow-lg shadow-brand-500/20">Lihat Pesanan Saya</button>';
        }
      }

      function coValidate() {
        var n = (document.getElementById('coName') || {}).value.trim();
        var ph = (document.getElementById('coPhone') || {}).value.trim();
        var ad = (document.getElementById('coAddr') || {}).value.trim();
        var ci = (document.getElementById('coCity') || {}).value.trim();
        var pr = (document.getElementById('coProv') || {}).value.trim();
        if (!n || !ph || !ad || !ci || !pr) {
          toast('Mohon lengkapi semua data pengiriman', 'warning');
          return;
        }
        coStep = 2;
        renderCheckout();
      }

      function cOrders() {
        if (!cMyOrders.length)
          return '<div class="c-fade max-w-3xl mx-auto px-4 sm:px-6 py-16 text-center"><i class="fa-solid fa-receipt text-5xl text-sf-300 mb-4"></i><h2 class="font-heading font-bold text-sf-800 text-xl mb-2">Belum Ada Pesanan</h2><p class="text-sm text-sf-400 mb-6">Mulai belanja untuk membuat pesanan pertamamu</p><button onclick="cNav(\'home\')" class="px-6 py-2.5 bg-brand-500 text-white font-medium text-sm rounded-xl hover:bg-brand-600 transition">Belanja Sekarang</button></div>';
        var h =
          '<div class="c-fade max-w-3xl mx-auto px-4 sm:px-6 py-8"><div class="flex items-center gap-3 mb-6"><button onclick="cNav(\'home\')" class="w-9 h-9 rounded-lg border border-sf-200 flex items-center justify-center text-sf-400 hover:text-sf-800 hover:border-sf-300 transition"><i class="fa-solid fa-arrow-left text-xs"></i></button><h2 class="font-heading font-bold text-sf-800 text-lg">Pesanan Saya</h2></div><div class="space-y-4">';
        cMyOrders.forEach(function (o) {
          var p = D.products.find(function (x) {
            return x.id === o.product_id;
          });
          h +=
            '<div class="bg-white rounded-2xl border border-sf-200 shadow-sm overflow-hidden"><div class="px-5 py-3 bg-sf-50 border-b border-sf-100 flex items-center justify-between"><span class="font-mono text-xs font-semibold text-sf-600">XIA-' +
            String(o.id).padStart(4, '0') +
            '</span><div class="flex items-center gap-2">' +
            stBadge(o.status) +
            '<span class="text-[11px] text-sf-400">' +
            fmtD(o.order_date) +
            '</span></div></div><div class="p-5 flex gap-4">';
          if (p) h += '<img src="' + p.img + '" class="w-20 h-20 rounded-xl object-cover flex-shrink-0" onerror="imgError(this)">';
          else h += '<div class="w-20 h-20 rounded-xl bg-sf-100 flex-shrink-0 img-ph text-sf-300"><i class="fa-solid fa-image"></i></div>';
          h +=
            '<div class="flex-1 min-w-0"><p class="font-medium text-sf-800 text-sm">' +
            (p ? p.product_name : 'Produk tidak tersedia') +
            '</p><p class="text-xs text-sf-400 mt-0.5">Qty: ' +
            o.qty +
            '</p><div class="flex items-center gap-4 mt-2"><span class="font-heading font-bold text-brand-600">' +
            fmt(o.total_price_idr) +
            '</span>';
          if (o.dp_amount_idr > 0) h += '<span class="text-xs text-sf-400">DP: ' + fmt(o.dp_amount_idr) + '</span>';
          if (o.remaining_payment_idr > 0) h += '<span class="text-xs text-orange-600 font-medium">Sisa: ' + fmt(o.remaining_payment_idr) + '</span>';
          h += '</div></div></div>';
          if (o.status === 'selesai' || o.status === 'terkirim')
            h += '<div class="px-5 py-3 border-t border-sf-100 flex justify-end"><button class="px-4 py-2 text-xs font-medium text-brand-600 border border-brand-200 rounded-lg hover:bg-brand-50 transition">Beli Lagi</button></div>';
          h += '</div>';
        });
        h += '</div></div>';
        return h;
      }

      /* ========== INIT ========== */
      document.addEventListener('DOMContentLoaded', function () {
        aNav('dashboard');
        var obs = new MutationObserver(function () {
          if (!document.getElementById('customerPanel').classList.contains('hidden')) {
            setTimeout(cRenderProducts, 50);
            obs.disconnect();
          }
        });
        obs.observe(document.getElementById('customerPanel'), { attributes: true, attributeFilter: ['class'] });
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          aCloseMo();
          closeCheckout();
        }
      });
    </script>
  </body>
</html>
